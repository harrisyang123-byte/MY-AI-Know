<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knowledge AI Chat - Prototype</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1e1e1e;
            color: #dcddde;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Chat Container */
        .chat-container {
            display: flex;
            flex-direction: column;
            height: 100%;
            max-width: 800px;
            width: 100%;
            margin: 0 auto;
            background: #2b2d31;
            border-left: 1px solid #3f4147;
            border-right: 1px solid #3f4147;
        }

        /* Header */
        .chat-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            border-bottom: 1px solid #3f4147;
            background: #313338;
        }

        .header-title {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            font-size: 15px;
        }

        .header-actions {
            display: flex;
            gap: 8px;
        }

        .header-btn {
            background: none;
            border: 1px solid #3f4147;
            color: #b5bac1;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }

        .header-btn:hover {
            background: #3f4147;
            color: #ffffff;
        }

        /* Messages Area */
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* Welcome Message */
        .welcome-msg {
            text-align: center;
            color: #949ba4;
            padding: 40px 20px;
            font-size: 14px;
            line-height: 1.6;
        }

        .welcome-msg .emoji {
            font-size: 48px;
            margin-bottom: 12px;
            display: block;
        }

        /* Chat Message */
        .message {
            max-width: 85%;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            align-self: flex-end;
        }

        .message.assistant {
            align-self: flex-start;
        }

        .message.system {
            align-self: center;
        }

        .message-bubble {
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .user .message-bubble {
            background: #5865f2;
            color: #ffffff;
            border-bottom-right-radius: 4px;
        }

        .assistant .message-bubble {
            background: #313338;
            color: #dcddde;
            border: 1px solid #3f4147;
            border-bottom-left-radius: 4px;
        }

        .system .message-bubble {
            background: #2b2d31;
            color: #949ba4;
            font-size: 12px;
            padding: 8px 16px;
            border-radius: 12px;
            border: 1px solid #3f4147;
        }

        /* Confirmation Buttons */
        .confirm-actions {
            display: flex;
            gap: 10px;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid #3f4147;
            justify-content: flex-end;
        }

        .confirm-btn {
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.2s;
        }

        .confirm-btn.primary {
            background: #5865f2;
            color: #ffffff;
            border: none;
        }

        .confirm-btn.primary:hover {
            background: #4752c4;
        }

        .confirm-btn.ghost {
            background: none;
            color: #b5bac1;
            border: 1px solid #3f4147;
        }

        .confirm-btn.ghost:hover {
            background: #313338;
            color: #ffffff;
        }

        /* Input Area */
        .input-area {
            border-top: 1px solid #3f4147;
            background: #313338;
            padding: 12px 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .input-wrapper {
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }

        .input-box {
            flex: 1;
            background: #383a40;
            border: 1px solid #3f4147;
            border-radius: 10px;
            padding: 12px 14px;
            color: #dcddde;
            font-size: 14px;
            resize: none;
            min-height: 44px;
            max-height: 120px;
            outline: none;
            line-height: 1.5;
            font-family: inherit;
        }

        .input-box:focus {
            border-color: #5865f2;
        }

        .input-box::placeholder {
            color: #949ba4;
        }

        .send-btn {
            background: #5865f2;
            color: #ffffff;
            border: none;
            border-radius: 8px;
            padding: 10px 16px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .send-btn:hover {
            background: #4752c4;
        }

        .send-btn:active {
            transform: scale(0.98);
        }

        /* Bottom Bar (Model Select) */
        .bottom-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 8px 16px;
            background: #2b2d31;
            border-top: 1px solid #3f4147;
        }

        .model-select-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
        }

        .model-select {
            flex: 1;
            background: #383a40;
            border: 1px solid #3f4147;
            border-radius: 8px;
            padding: 8px 12px;
            color: #dcddde;
            font-size: 13px;
            cursor: pointer;
            outline: none;
            max-width: 400px;
        }

        .model-select:focus {
            border-color: #5865f2;
        }

        .bottom-actions {
            display: flex;
            gap: 8px;
        }

        .bottom-action-btn {
            background: none;
            border: none;
            color: #b5bac1;
            padding: 6px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 18px;
            transition: all 0.2s;
        }

        .bottom-action-btn:hover {
            background: #383a40;
            color: #ffffff;
        }

        /* Scrollbar */
        .messages-area::-webkit-scrollbar {
            width: 6px;
        }

        .messages-area::-webkit-scrollbar-track {
            background: transparent;
        }

        .messages-area::-webkit-scrollbar-thumb {
            background: #3f4147;
            border-radius: 3px;
        }

        .messages-area::-webkit-scrollbar-thumb:hover {
            background: #4f545c;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <!-- Header -->
        <div class="chat-header">
            <div class="header-title">
                <span>🧠</span>
                <span>Knowledge AI</span>
            </div>
            <div class="header-actions">
                <button class="header-btn">📄 提取当前笔记</button>
                <button class="header-btn">📊 图谱</button>
                <button class="header-btn">🔍 日志</button>
            </div>
        </div>

        <!-- Messages Area -->
        <div class="messages-area" id="messagesArea">
            <div class="welcome-msg">
                <span class="emoji">💡</span>
                <div>粘贴内容或打开笔记，选择技能开始分析</div>
            </div>

            <!-- Example User Message -->
            <div class="message user">
                <div class="message-bubble">
                    帮我分析一下这篇文章中的概念和关系
                </div>
            </div>

            <!-- Example System Message -->
            <div class="message system">
                <div class="message-bubble">
                    🧠 正在用 Gemini 3 Flash 提取概念和关系...
                </div>
            </div>

            <!-- Example Assistant Message with Confirmation -->
            <div class="message assistant">
                <div class="message-bubble">
                    📋 提取结果<br><br>
                    <strong>概念 (3个)</strong><br>
                    • 人工智能: 计算机科学的一个分支<br>
                    • 机器学习: 人工智能的子领域<br>
                    • 深度学习: 机器学习的子领域<br><br>
                    <strong>关系 (2条)</strong><br>
                    • 人工智能 → 机器学习 (包含)<br>
                    • 机器学习 → 深度学习 (包含)<br><br>
                    <strong>摘要</strong>: 本文介绍了人工智能及其子领域的关系
                </div>
                <div class="confirm-actions">
                    <button class="confirm-btn ghost">✗ 取消</button>
                    <button class="confirm-btn primary">✓ 确认并保存</button>
                </div>
            </div>
        </div>

        <!-- Input Area -->
        <div class="input-area">
            <div class="input-wrapper">
                <textarea class="input-box" placeholder="输入问题，与 AI 讨论笔记内容..."></textarea>
                <button class="send-btn">
                    <span>📨</span>
                    <span>发送</span>
                </button>
            </div>
        </div>

        <!-- Bottom Bar (Model Select) -->
        <div class="bottom-bar">
            <div class="model-select-wrapper">
                <select class="model-select">
                    <option value="gemini-flash">Gemini 3 Flash (日常首选, 知识提取)</option>
                    <option value="deepseek-reasoner">DeepSeek Reasoner (复杂推理, 知识提取)</option>
                    <option value="gpt-4o-mini">GPT-4o Mini (图形理解, 知识提取)</option>
                    <option value="gemini-pro">Gemini 3.1 Pro (复杂推理, 知识提取)</option>
                    <option value="gemini-lite">Gemini 3.1 Flash-Lite (最省钱, 知识提取)</option>
                </select>
            </div>
            <div class="bottom-actions">
                <button class="bottom-action-btn">📎</button>
                <button class="bottom-action-btn">✏️</button>
            </div>
        </div>
    </div>

    <script>
        // Simple demo functionality
        const textarea = document.querySelector('.input-box');
        const sendBtn = document.querySelector('.send-btn');
        const messagesArea = document.querySelector('.messages-area');

        sendBtn.addEventListener('click', sendMessage);
        textarea.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        function sendMessage() {
            const text = textarea.value.trim();
            if (!text) return;

            // Add user message
            const userMsg = document.createElement('div');
            userMsg.className = 'message user';
            userMsg.innerHTML = `<div class="message-bubble">${text}</div>`;
            messagesArea.appendChild(userMsg);

            // Clear input
            textarea.value = '';

            // Scroll to bottom
            messagesArea.scrollTop = messagesArea.scrollHeight;

            // Simulate system message
            setTimeout(() => {
                const systemMsg = document.createElement('div');
                systemMsg.className = 'message system';
                systemMsg.innerHTML = `<div class="message-bubble">🧠 正在处理...</div>`;
                messagesArea.appendChild(systemMsg);
                messagesArea.scrollTop = messagesArea.scrollHeight;
            }, 300);
        }
    </script>
</body>
</html>
