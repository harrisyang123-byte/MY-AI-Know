# Claude Code Model Router Configuration
# Place this file as models.yaml or .claude-router.yaml in your project root

default_model: gemini-3-flash

models:
  deepseek:
    display_name: "DeepSeek V3.2"
    provider: deepseek
    model_id: deepseek-chat
    base_url: https://api.deepseek.com/anthropic
    api_key_env: DEEPSEEK_API_KEY
    auth_header: x-api-key
    max_tokens: 128000
    context_window: 128000

  kimi:
    display_name: "Kimi K2.5"
    provider: moonshot
    model_id: kimi-for-coding
    base_url: https://api.kimi.com/coding/
    api_key_env: KIMI_API_KEY
    auth_header: x-api-key
    max_tokens: 32768
    context_window: 256000

  minimax:
    display_name: "MiniMax M2.7"
    provider: minimax
    model_id: MiniMax-M2.7
    base_url: https://api.minimaxi.com/anthropic
    api_key_env: MINIMAX_API_KEY
    auth_header: x-api-key
    max_tokens: 196608
    context_window: 204800

  qwen:
    display_name: "Qwen3.5 Plus"
    provider: alibaba
    model_id: qwen3.5-plus
    base_url: https://dashscope.aliyuncs.com/apps/anthropic
    api_key_env: QWEN_API_KEY
    auth_header: x-api-key
    max_tokens: 65536
    context_window: 1000000

  glm:
    display_name: "GLM-5"
    provider: zhipu
    model_id: glm-5
    base_url: https://open.bigmodel.cn/api/anthropic
    api_key_env: GLM_API_KEY
    auth_header: x-api-key
    max_tokens: 128000
    context_window: 200000

  kat:
    display_name: "KAT-Coder-Pro V2"
    provider: kuaishou
    model_id: kat-coder-pro-v2
    base_url: https://wanqing.streamlakeapi.com/api/gateway/coding/kat-coder-pro-v2/claude-code-proxy
    api_key_env: KAT_API_KEY
    auth_header: x-api-key
    max_tokens: 81920
    context_window: 262144

  gemini-3-flash:
    display_name: "Gemini 3 Flash (Pro级智能·Flash速度)"
    provider: google
    model_id: gemini-3-flash
    base_url: http://127.0.0.1:4000
    api_key_env: GEMINI_API_KEY
    auth_header: x-api-key
    max_tokens: 64000
    context_window: 1000000

  gemini-3-pro:
    display_name: "Gemini 3.1 Pro (最强推理·复杂任务)"
    provider: google
    model_id: gemini-3-pro
    base_url: http://127.0.0.1:4000
    api_key_env: GEMINI_API_KEY
    auth_header: x-api-key
    max_tokens: 64000
    context_window: 1000000

  gemini-3-flash-lite:
    display_name: "Gemini 3.1 Flash-Lite (经济型·高吞吐)"
    provider: google
    model_id: gemini-3-flash-lite
    base_url: http://127.0.0.1:4000
    api_key_env: GEMINI_API_KEY
    auth_header: x-api-key
    max_tokens: 64000
    context_window: 1000000

  gemini-3-flash-image:
    display_name: "Gemini 3.1 Flash Image (图片生成·高效率)"
    provider: google
    model_id: gemini-3-flash-image
    base_url: http://127.0.0.1:4000
    api_key_env: GEMINI_API_KEY
    auth_header: x-api-key
    max_tokens: 32000
    context_window: 128000

  gemini-3-pro-image:
    display_name: "Gemini 3 Pro Image (高质量图片生成)"
    provider: google
    model_id: gemini-3-pro-image
    base_url: http://127.0.0.1:4000
    api_key_env: GEMINI_API_KEY
    auth_header: x-api-key
    max_tokens: 32000
    context_window: 65000

aliases:
  ds: deepseek
  deepseek-v3.2: deepseek
  mm: minimax
  minimax-m2.7: minimax
  kimi-k2.5: kimi
  qwen3.5-plus: qwen
  glm-5: glm
  kat-coder: kat
  kat-coder-pro-v2: kat
  kuaishou: kat
  gemini: gemini-3-flash
  gemini-3-flash: gemini-3-flash
  gemini-3-pro: gemini-3-pro
  gemini-3-lite: gemini-3-flash-lite
  gemini-3-img: gemini-3-pro-image
  google: gemini-3-flash

gateway:
  port: 8080
  timeout: 300
